<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Barcode_Goo{% endblock %}</title>
 
  <!-- Bootstrap RTL -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

  <style>
    body {
      transition: 0.3s ease;
    }

    /* LIGHT MODE */
    body.light-mode {
      background: #f8f9fa;
      color: #212529;
    }

    /* DARK MODE */
    body.dark-mode {
      background: #0f172a;
      color: #ffffff;
    }

    /* Navbar style */
    .navbar-custom {
      transition: 0.3s;
    }

    body.dark-mode .navbar-custom {
      background-color: #111827 !important;
    }

    body.light-mode .navbar-custom {
      background-color: #ffffff !important;
    }

    body.dark-mode .nav-link {
      color: #ffffff !important;
    }

    body.dark-mode .navbar-brand {
      color: #ffffff !important;
    }

    /* Cards in dark mode */
    body.dark-mode .card {
      background: #1e293b;
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Button smooth */
    .btn {
      transition: 0.2s;
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>

<body class="light-mode">

<nav class="navbar navbar-expand-lg navbar-custom shadow-sm">
  <div class="container">

    <a class="navbar-brand fw-bold" href="#">
      Barcode_Goo
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">

      <ul class="navbar-nav ms-auto align-items-center gap-2">

        <!-- Dark/Light Toggle -->
        <li class="nav-item">
          <button id="modeToggle" class="btn btn-outline-secondary btn-sm">
            🌙
          </button>
        </li>

        {% if user.is_authenticated %}

          <li class="nav-item">
            <a class="nav-link" href="{% url 'accounts:dashboard' %}">
              Dashboard
            </a>
          </li>

          <li class="nav-item">
            <form method="post" action="{% url 'accounts:logout' %}">
              {% csrf_token %}
              <button type="submit" class="btn btn-danger btn-sm">
                خروج
              </button>
            </form>
          </li>

        {% else %}

          <li class="nav-item">
            <a class="nav-link" href="{% url 'login' %}">
              تسجيل الدخول
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{% url 'accounts:signup' %}">
              إنشاء حساب
            </a>
          </li>

        {% endif %}

      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const body = document.body;
  const toggleBtn = document.getElementById("modeToggle");

  // Load saved theme
  const savedTheme = localStorage.getItem("theme");

  if (savedTheme) {
    body.className = savedTheme;
    updateIcon(savedTheme);
  }

  toggleBtn.addEventListener("click", () => {
    if (body.classList.contains("light-mode")) {
      body.classList.remove("light-mode");
      body.classList.add("dark-mode");
      localStorage.setItem("theme", "dark-mode");
      updateIcon("dark-mode");
    } else {
      body.classList.remove("dark-mode");
      body.classList.add("light-mode");
      localStorage.setItem("theme", "light-mode");
      updateIcon("light-mode");
    }
  });

  function updateIcon(mode) {
    toggleBtn.innerHTML = mode === "dark-mode" ? "☀️" : "🌙";
  }
</script>

</body>
</html>
